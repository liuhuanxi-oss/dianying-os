<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>店赢OS - 平台端</title>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --color-primary: #6366F1;
      --color-primary-light: #818CF8;
      --color-cta: #10B981;
      --color-cta-hover: #059669;
      --color-bg: #F5F3FF;
      --color-card: #FFFFFF;
      --color-text: #1E1B4B;
      --color-text-secondary: #6366F1;
      --color-text-muted: #94A3B8;
      --color-border: #E2E8F0;
      --color-sidebar: #1E1B4B;
      --color-sidebar-hover: #2D2A5E;
      --color-danger: #EF4444;
      --color-warning: #F59E0B;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: 'Fira Code', monospace;
      --radius: 12px;
      --radius-sm: 8px;
      --spacing-sm: 8px;
      --spacing-md: 16px;
      --spacing-lg: 24px;
      --transition: 200ms ease;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    body { 
      font-family: var(--font-sans); 
      background: var(--color-bg); 
      color: var(--color-text);
      line-height: 1.6;
    }

    :focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: 2px;
    }

    .app-layout { display: flex; min-height: 100vh; }
    
    .sidebar { 
      width: 260px; 
      background: var(--color-sidebar); 
      color: white; 
      display: flex; 
      flex-direction: column; 
      position: fixed; 
      top: 0; 
      left: 0; 
      bottom: 0; 
      z-index: 100;
    }
    .sidebar-header { 
      padding: var(--spacing-lg) var(--spacing-md); 
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-icon { 
      width: 40px; 
      height: 40px; 
      background: var(--color-cta);
      border-radius: var(--radius-sm); 
      display: flex; 
      align-items: center; 
      justify-content: center;
      color: white;
    }
    .logo-title { font-size: 1.2rem; font-weight: 700; }
    .logo-subtitle { font-size: 0.75rem; color: var(--color-text-muted); }
    
    .sidebar-menu { flex: 1; overflow-y: auto; padding: var(--spacing-md) 0; }
    .menu-section { margin-bottom: var(--spacing-lg); }
    .menu-section-title { 
      padding: 0 var(--spacing-md) var(--spacing-sm); 
      font-size: 0.7rem; 
      color: var(--color-text-muted); 
      text-transform: uppercase; 
      letter-spacing: 0.05em; 
      font-weight: 600; 
    }
    .menu-item { 
      display: flex; 
      align-items: center; 
      gap: 12px; 
      padding: 10px var(--spacing-md); 
      cursor: pointer; 
      transition: background var(--transition), color var(--transition);
      color: var(--color-text-muted);
    }
    .menu-item:hover { background: var(--color-sidebar-hover); color: white; }
    .menu-item.active { background: var(--color-cta); color: white; }
    
    .sidebar-footer { 
      padding: var(--spacing-md); 
      border-top: 1px solid rgba(255,255,255,0.1); 
    }
    .user-info { display: flex; align-items: center; gap: 12px; }
    .user-avatar { 
      width: 36px; 
      height: 36px; 
      background: var(--color-cta); 
      border-radius: 50%; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      color: white;
    }
    .user-name { font-weight: 600; font-size: 0.9rem; }
    .user-role { font-size: 0.75rem; color: var(--color-text-muted); }
    
    .main-content { 
      flex: 1; 
      margin-left: 260px; 
      display: flex; 
      flex-direction: column; 
      min-height: 100vh; 
    }
    .header { 
      height: 64px; 
      background: var(--color-card); 
      border-bottom: 1px solid var(--color-border); 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      padding: 0 var(--spacing-lg);
    }
    .page-title { font-size: 1.1rem; font-weight: 600; color: var(--color-text); }
    .content-area { flex: 1; padding: var(--spacing-lg); overflow-y: auto; }
    
    .card { 
      background: var(--color-card); 
      border-radius: var(--radius); 
      padding: var(--spacing-lg); 
      margin-bottom: var(--spacing-md);
      border: 1px solid var(--color-border);
    }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-md); }
    .card-title { font-size: 1rem; font-weight: 600; color: var(--color-text); }
    
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--spacing-md); }
    .stat-card { 
      background: var(--color-card); 
      border-radius: var(--radius); 
      padding: var(--spacing-lg); 
      border: 1px solid var(--color-border);
    }
    .stat-value { font-size: 2rem; font-weight: 700; color: var(--color-text); font-family: var(--font-mono); }
    .stat-label { font-size: 0.85rem; color: var(--color-text-muted); margin-top: 4px; }
    .stat-trend { font-size: 0.8rem; margin-top: var(--spacing-sm); }
    .stat-trend.up { color: var(--color-cta); }
    .stat-trend.down { color: var(--color-danger); }
    
    .charts-grid { display: grid; grid-template-columns: 2fr 1fr; gap: var(--spacing-md); margin-top: var(--spacing-md); }
    .chart-container { 
      background: var(--color-card); 
      border-radius: var(--radius); 
      padding: var(--spacing-lg); 
      border: 1px solid var(--color-border);
    }
    
    .btn { 
      display: inline-flex; 
      align-items: center; 
      gap: 6px; 
      padding: 10px 16px; 
      border-radius: var(--radius-sm); 
      font-size: 0.875rem; 
      font-weight: 500; 
      cursor: pointer; 
      border: none; 
      transition: all var(--transition);
    }
    .btn-primary { background: var(--color-primary); color: white; }
    .btn-primary:hover { background: var(--color-primary-light); }
    .btn-secondary { background: var(--color-card); color: var(--color-text); border: 1px solid var(--color-border); }
    .btn-secondary:hover { background: var(--color-bg); }
    .btn-success { background: var(--color-cta); color: white; }
    .btn-sm { padding: 6px 12px; font-size: 0.8rem; }
    
    .tag { cursor: pointer;
      display: inline-flex; 
      align-items: center; 
      padding: 4px 10px; 
      border-radius: 20px; 
      font-size: 0.75rem; 
      font-weight: 500; 
    }
    .tag-green { background: #DCFCE7; color: #15803D; }
    .tag-blue { background: #DBEAFE; color: #1D4ED8; }
    .tag-yellow { background: #FEF3C7; color: #B45309; }
    .tag-gray { background: var(--color-bg); color: var(--color-text-muted); }
    
    /* Table */
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th { text-align: left; padding: 12px; background: var(--color-bg); font-weight: 600; font-size: 0.85rem; color: var(--color-text-muted); }
    .data-table td { padding: 12px; border-bottom: 1px solid var(--color-border); }
    .data-table tr:hover td { background: var(--color-bg); }
    
    /* Merchant cards */
    .merchant-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--spacing-md); margin-top: var(--spacing-md); }
    .merchant-card { 
      background: var(--color-card); 
      border-radius: var(--radius); 
      padding: var(--spacing-lg); 
      border: 1px solid var(--color-border);
      transition: all var(--transition);
      cursor: pointer;
    }
    .merchant-card:hover { border-color: var(--color-primary); }
    .merchant-avatar { 
      width: 48px; 
      height: 48px; 
      border-radius: var(--radius-sm); 
      background: var(--color-primary); 
      display: flex; 
      align-items: center; 
      justify-content: center;
      color: white;
      margin-bottom: 12px;
    }
    .merchant-name { font-weight: 600; margin-bottom: 4px; }
    .merchant-category { font-size: 0.8rem; color: var(--color-text-muted); margin-bottom: 8px; }
    .merchant-stats { display: flex; gap: 16px; font-size: 0.85rem; }
    .merchant-stat { text-align: center; }
    .merchant-stat-value { font-weight: 600; font-family: var(--font-mono); }
    .merchant-stat-label { font-size: 0.75rem; color: var(--color-text-muted); }
    
    /* Agent list */
    .agent-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--spacing-md); margin-top: var(--spacing-md); }
    .agent-card { 
      background: var(--color-card); 
      border-radius: var(--radius); 
      padding: var(--spacing-lg); 
      border: 1px solid var(--color-border);
      transition: all var(--transition);
    }
    .agent-avatar { 
      width: 48px; 
      height: 48px; 
      border-radius: 50%; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      color: white;
      margin-bottom: 12px;
    }
    .agent-gold { background: #F59E0B; }
    .agent-silver { background: #94A3B8; }
    .agent-bronze { background: #CD7F32; }
    .agent-name { font-weight: 600; margin-bottom: 4px; }
    .agent-level { font-size: 0.8rem; color: var(--color-text-muted); margin-bottom: 8px; }
    .agent-stats { display: flex; gap: 16px; font-size: 0.85rem; }
    
    /* Finance */
    .finance-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--spacing-md); margin-bottom: var(--spacing-md); }
    .finance-card { 
      background: var(--color-card); 
      border-radius: var(--radius); 
      padding: var(--spacing-lg); 
      border: 1px solid var(--color-border);
    }
    .finance-icon { 
      width: 40px; 
      height: 40px; 
      border-radius: var(--radius-sm); 
      display: flex; 
      align-items: center; 
      justify-content: center;
      margin-bottom: 12px;
    }
    .finance-icon.green { background: #DCFCE7; color: #15803D; }
    .finance-icon.blue { background: #DBEAFE; color: #1D4ED8; }
    .finance-icon.purple { background: #F3E8FF; color: #7C3AED; }
    .finance-icon.orange { background: #FEF3C7; color: #B45309; }
    .finance-value { font-size: 1.5rem; font-weight: 700; font-family: var(--font-mono); }
    .finance-label { font-size: 0.85rem; color: var(--color-text-muted); margin-top: 4px; }
    .finance-change { font-size: 0.8rem; margin-top: 8px; }
    
    /* Toast */
    .toast { 
      position: fixed; 
      bottom: var(--spacing-lg); 
      right: var(--spacing-lg); 
      padding: 12px 20px; 
      background: var(--color-text); 
      color: white; 
      border-radius: var(--radius-sm); 
      z-index: 2000; 
      animation: slideIn 0.3s ease-out;
    }
    .toast.success { background: var(--color-cta); }
    @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    
    @media (max-width: 1024px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .merchant-grid { grid-template-columns: repeat(2, 1fr); }
      .agent-grid { grid-template-columns: repeat(2, 1fr); }
      .finance-summary { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .main-content { margin-left: 0; }
      .stats-grid { grid-template-columns: 1fr; }
      .charts-grid { grid-template-columns: 1fr; }
      .merchant-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon"><i data-lucide="building-2"></i></div>
          <div>
            <div class="logo-title">店赢OS</div>
            <div class="logo-subtitle">平台端</div>
          </div>
        </div>
      </div>
      <div class="sidebar-menu" id="sidebar-menu"></div>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar"><i data-lucide="user"></i></div>
          <div>
            <div class="user-name">管理员</div>
            <div class="user-role">超级管理员</div>
          </div>
        </div>
      </div>
    </div>
    
    <div class="main-content">
      <div class="header">
        <div class="page-title" id="pageTitle">平台概览</div>
        <div class="header-actions" id="headerActions"></div>
      </div>
      <div class="content-area" id="contentArea"></div>
    </div>
  </div>

  <script>
    const menuConfig = [
      { section: '平台运营', items: [
        { id: 'overview', name: '平台概览', icon: 'layout-dashboard' },
        { id: 'merchants', name: '商家管理', icon: 'store' },
        { id: 'agents', name: '代理商管理', icon: 'users' },
        { id: 'sales', name: '业务人员', icon: 'user-check' }
      ]},
      { section: '数据中心', items: [
        { id: 'analytics', name: '数据洞察', icon: 'bar-chart-2' },
        { id: 'finance', name: '财务中心', icon: 'dollar-sign' },
        { id: 'payment', name: '支付交易', icon: 'credit-card' }
      ]},
      { section: '系统', items: [
        { id: 'settings', name: '系统设置', icon: 'settings' }
      ]}
    ];

    let currentPage = 'overview';
    let charts = {};

    const merchants = [
      { id: 1, name: '川味坊', category: '川菜', monthlySales: '¥328,560', orders: 2856, rating: 4.9, status: 'active' },
      { id: 2, name: '湘江楼', category: '湘菜', monthlySales: '¥286,340', orders: 2456, rating: 4.8, status: 'active' },
      { id: 3, name: '粤式茶餐厅', category: '粤菜', monthlySales: '¥245,780', orders: 2134, rating: 4.7, status: 'active' },
      { id: 4, name: '老北京涮肉', category: '火锅', monthlySales: '¥198,560', orders: 1789, rating: 4.6, status: 'active' },
      { id: 5, name: '日式料理', category: '日料', monthlySales: '¥176,890', orders: 1523, rating: 4.9, status: 'active' },
      { id: 6, name: '韩式烤肉', category: '韩餐', monthlySales: '¥165,340', orders: 1432, rating: 4.5, status: 'active' },
      { id: 7, name: '西餐厅', category: '西餐', monthlySales: '¥145,670', orders: 1234, rating: 4.7, status: 'active' },
      { id: 8, name: '咖啡馆', category: '饮品', monthlySales: '¥98,450', orders: 2134, rating: 4.8, status: 'active' }
    ];

    const agents = [
      { id: 1, name: '张明远', level: '金牌代理商', merchants: 156, monthlyRevenue: '¥2.8M', commission: '¥86,500', avatar: 'user' },
      { id: 2, name: '李婉清', level: '金牌代理商', merchants: 142, monthlyRevenue: '¥2.5M', commission: '¥78,200', avatar: 'user' },
      { id: 3, name: '王建国', level: '银牌代理商', merchants: 98, monthlyRevenue: '¥1.8M', commission: '¥52,300', avatar: 'user' },
      { id: 4, name: '刘晓峰', level: '银牌代理商', merchants: 87, monthlyRevenue: '¥1.6M', commission: '¥46,800', avatar: 'user' },
      { id: 5, name: '陈雅琴', level: '铜牌代理商', merchants: 65, monthlyRevenue: '¥1.2M', commission: '¥32,500', avatar: 'user' },
      { id: 6, name: '赵子轩', level: '铜牌代理商', merchants: 58, monthlyRevenue: '¥1.0M', commission: '¥28,600', avatar: 'user' }
    ];

    const recentTransactions = [
      { id: 'TXN001', merchant: '川味坊', amount: '¥2,560', time: '10:32:15', status: 'success' },
      { id: 'TXN002', merchant: '湘江楼', amount: '¥1,280', time: '10:31:42', status: 'success' },
      { id: 'TXN003', merchant: '粤式茶餐厅', amount: '¥890', time: '10:30:58', status: 'success' },
      { id: 'TXN004', merchant: '老北京涮肉', amount: '¥3,450', time: '10:29:33', status: 'pending' },
      { id: 'TXN005', merchant: '日式料理', amount: '¥1,680', time: '10:28:21', status: 'success' }
    ];

    function renderSidebar() {
      const menuEl = document.getElementById('sidebar-menu');
      let html = '';
      menuConfig.forEach(section => {
        html += `<div class="menu-section"><div class="menu-section-title">${section.section}</div>`;
        section.items.forEach(item => {
          const isActive = currentPage === item.id ? 'active' : '';
          html += `<div class="menu-item ${isActive}" onclick="navigateTo('${item.id}', '${item.name}')" role="button" tabindex="0"><i data-lucide="${item.icon}"></i><span>${item.name}</span></div>`;
        });
        html += `</div>`;
      });
      menuEl.innerHTML = html;
      lucide.createIcons();
    }

    function navigateTo(pageId, pageName) {
      Object.values(charts).forEach(chart => chart.destroy());
      charts = {};
      currentPage = pageId;
      document.getElementById('pageTitle').textContent = pageName;
      renderSidebar();
      renderPage(pageId);
      lucide.createIcons();
    }

    function showToast(message, type = 'default') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function renderPage(pageId) {
      const content = document.getElementById('contentArea');
      
      if (pageId === 'overview') {
        content.innerHTML = `
          <div class="stats-grid">
            <div class="stat-card"><div class="stat-value">3,256</div><div class="stat-label">入驻商家数</div><div class="stat-trend up">↑ 156 今日新增</div></div>
            <div class="stat-card"><div class="stat-value">128</div><div class="stat-label">代理商数</div><div class="stat-trend up">↑ 8 今日新增</div></div>
            <div class="stat-card"><div class="stat-value">¥8.6M</div><div class="stat-label">今日总交易额</div><div class="stat-trend up">↑ 18.5% 较昨日</div></div>
            <div class="stat-card"><div class="stat-value">98.6%</div><div class="stat-label">系统可用率</div><div class="stat-trend up">正常运行</div></div>
          </div>
          
          <div class="charts-grid">
            <div class="chart-container"><div class="card-title">近30天交易趋势</div><canvas id="platformTrendChart" height="250"></canvas></div>
            <div class="chart-container"><div class="card-title">商家行业分布</div><canvas id="categoryChart" height="250"></canvas></div>
          </div>
          
          <div class="card" style="margin-top: var(--spacing-md);">
            <div class="card-header"><div class="card-title">实时交易监控</div><span class="tag tag-green">在线</span></div>
            <table class="data-table">
              <thead><tr><th>订单号</th><th>商家</th><th>金额</th><th>时间</th><th>状态</th></tr></thead>
              <tbody>
                ${recentTransactions.map(t => `<tr><td style="font-family: var(--font-mono);">${t.id}</td><td>${t.merchant}</td><td style="font-family: var(--font-mono);">${t.amount}</td><td style="color: var(--color-text-muted);">${t.time}</td><td><span class="tag ${t.status === 'success' ? 'tag-green' : 'tag-yellow'}">${t.status === 'success' ? '成功' : '处理中'}</span></td></tr>`).join('')}
              </tbody>
            </table>
          </div>
        `;
        setTimeout(() => {
          lucide.createIcons();
          charts.platformTrend = new Chart(document.getElementById('platformTrendChart'), {
            type: 'line',
            data: {
              labels: ['1日', '5日', '10日', '15日', '20日', '25日', '30日'],
              datasets: [{ label: '交易额(万元)', data: [680, 720, 750, 810, 780, 850, 860], borderColor: '#6366F1', backgroundColor: 'rgba(99, 102, 241, 0.1)', fill: true, tension: 0.4 }]
            },
            options: { responsive: true, plugins: { legend: { display: false } } }
          });
          charts.category = new Chart(document.getElementById('categoryChart'), {
            type: 'doughnut',
            data: { labels: ['川菜', '湘菜', '粤菜', '火锅', '日料', '其他'], datasets: [{ data: [28, 22, 18, 15, 10, 7], backgroundColor: ['#6366F1', '#818CF8', '#F59E0B', '#10B981', '#EC4899', '#94A3B8'] }] },
            options: { responsive: true }
          });
        }, 100);

      } else if (pageId === 'merchants') {
        content.innerHTML = `
          <div class="card">
            <div class="card-header">
              <div class="card-title">商家列表</div>
              <div style="display: flex; gap: 8px;">
                <button class="btn btn-secondary btn-sm"><i data-lucide="search"></i> 搜索</button>
                <button class="btn btn-primary btn-sm"><i data-lucide="plus"></i> 新增商家</button>
              </div>
            </div>
            <div style="display: flex; gap: 12px; margin-bottom: 16px;">
              <span class="tag tag-green" style="cursor: pointer;">全部 3,256</span>
              <span class="tag tag-gray" style="cursor: pointer;">活跃 2,890</span>
              <span class="tag tag-gray" style="cursor: pointer;">待审核 156</span>
              <span class="tag tag-gray" style="cursor: pointer;">已冻结 210</span>
            </div>
            <table class="data-table">
              <thead><tr><th>商家名称</th><th>行业</th><th>月销售额</th><th>订单数</th><th>评分</th><th>状态</th><th>操作</th></tr></thead>
              <tbody>
                ${merchants.map(m => `<tr><td><div style="display: flex; align-items: center; gap: 8px;"><div class="merchant-avatar" style="width: 32px; height: 32px; margin: 0;"><i data-lucide="store" style="width: 16px; height: 16px;"></i></div>${m.name}</div></td><td>${m.category}</td><td style="font-family: var(--font-mono);">${m.monthlySales}</td><td style="font-family: var(--font-mono);">${m.orders.toLocaleString()}</td><td style="font-family: var(--font-mono);">${m.rating}</td><td><span class="tag tag-green">活跃</span></td><td><button class="btn btn-secondary btn-sm">详情</button></td></tr>`).join('')}
              </tbody>
            </table>
          </div>
        `;
        lucide.createIcons();

      } else if (pageId === 'agents') {
        content.innerHTML = `
          <div class="stats-grid" style="margin-bottom: var(--spacing-md);">
            <div class="stat-card"><div class="stat-value">128</div><div class="stat-label">代理商总数</div><div class="stat-trend up">本月新增 12</div></div>
            <div class="stat-card"><div class="stat-value">¥42.5M</div><div class="stat-label">代理总交易额</div><div class="stat-trend up">↑ 22.3%</div></div>
            <div class="stat-card"><div class="stat-value">¥1.28M</div><div class="stat-label">本月分润总额</div><div class="stat-trend up">↑ 18.5%</div></div>
            <div class="stat-card"><div class="stat-value">98.2%</div><div class="stat-label">代理活跃率</div><div class="stat-trend up">健康</div></div>
          </div>
          
          <div class="card">
            <div class="card-header"><div class="card-title">代理商列表</div><button class="btn btn-primary btn-sm"><i data-lucide="plus"></i> 新增代理</button></div>
            <div class="agent-grid">
              ${agents.map(a => `
                <div class="agent-card" onclick="showToast('查看代理商详情')">
                  <div class="agent-avatar ${a.level.includes('金牌') ? 'agent-gold' : a.level.includes('银牌') ? 'agent-silver' : 'agent-bronze'}"><i data-lucide="${a.avatar}"></i></div>
                  <div class="agent-name">${a.name}</div>
                  <div class="agent-level">${a.level}</div>
                  <div class="agent-stats">
                    <div class="merchant-stat"><div class="merchant-stat-value">${a.merchants}</div><div class="merchant-stat-label">商户</div></div>
                    <div class="merchant-stat"><div class="merchant-stat-value">${a.monthlyRevenue}</div><div class="merchant-stat-label">月交易</div></div>
                    <div class="merchant-stat"><div class="merchant-stat-value">${a.commission}</div><div class="merchant-stat-label">月分润</div></div>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
        lucide.createIcons();

      } else if (pageId === 'analytics') {
        content.innerHTML = `
          <div class="stats-grid">
            <div class="stat-card"><div class="stat-value">¥256.8M</div><div class="stat-label">累计交易额</div><div class="stat-trend up">↑ 25.6% 本月</div></div>
            <div class="stat-card"><div class="stat-value">2,890,560</div><div class="stat-label">累计订单数</div><div class="stat-trend up">↑ 18.3% 本月</div></div>
            <div class="stat-card"><div class="stat-value">4.7</div><div class="stat-label">平均评分</div><div class="stat-trend up">↑ 0.2 本月</div></div>
            <div class="stat-card"><div class="stat-value">89.5%</div><div class="stat-label">订单完成率</div><div class="stat-trend up">稳定</div></div>
          </div>
          
          <div class="charts-grid" style="margin-top: var(--spacing-md);">
            <div class="chart-container"><div class="card-title">年度交易趋势</div><canvas id="yearTrendChart" height="250"></canvas></div>
            <div class="chart-container"><div class="card-title">地区分布 TOP5</div><canvas id="regionChart" height="250"></canvas></div>
          </div>
          
          <div class="card" style="margin-top: var(--spacing-md);">
            <div class="card-header"><div class="card-title">商家排行榜</div></div>
            <table class="data-table">
              <thead><tr><th>排名</th><th>商家</th><th>月交易额</th><th>增长率</th><th>评分</th></tr></thead>
              <tbody>
                <tr><td style="font-weight: 600; color: var(--color-warning);">🥇 1</td><td>川味坊</td><td style="font-family: var(--font-mono);">¥328,560</td><td style="color: var(--color-cta);">+28.5%</td><td>4.9</td></tr>
                <tr><td style="font-weight: 600; color: var(--color-text-muted);">🥈 2</td><td>湘江楼</td><td style="font-family: var(--font-mono);">¥286,340</td><td style="color: var(--color-cta);">+22.3%</td><td>4.8</td></tr>
                <tr><td style="font-weight: 600; color: #CD7F32;">🥉 3</td><td>粤式茶餐厅</td><td style="font-family: var(--font-mono);">¥245,780</td><td style="color: var(--color-cta);">+18.6%</td><td>4.7</td></tr>
              </tbody>
            </table>
          </div>
        `;
        setTimeout(() => {
          lucide.createIcons();
          charts.yearTrend = new Chart(document.getElementById('yearTrendChart'), {
            type: 'line',
            data: { labels: ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'], datasets: [{ label: '交易额(万元)', data: [1800, 2200, 2800, 3200, 3600, 4200, 4800, 5200, 5800, 6200, 6800, 7200], borderColor: '#6366F1', backgroundColor: 'rgba(99, 102, 241, 0.1)', fill: true, tension: 0.4 }] },
            options: { responsive: true, plugins: { legend: { display: false } } }
          });
          charts.region = new Chart(document.getElementById('regionChart'), {
            type: 'bar',
            data: { labels: ['北京', '上海', '广州', '深圳', '杭州'], datasets: [{ label: '商家数', data: [680, 720, 560, 480, 420], backgroundColor: '#10B981' }] },
            options: { responsive: true, indexAxis: 'y', plugins: { legend: { display: false } } }
          });
        }, 100);

      } else if (pageId === 'finance') {
        content.innerHTML = `
          <div class="finance-summary">
            <div class="finance-card"><div class="finance-icon green"><i data-lucide="wallet"></i></div><div class="finance-value">¥42.5M</div><div class="finance-label">平台总营收</div><div class="finance-change" style="color: var(--color-cta);">↑ 22.3% 本月</div></div>
            <div class="finance-card"><div class="finance-icon blue"><i data-lucide="credit-card"></i></div><div class="finance-value">¥8.6M</div><div class="finance-label">本月流水</div><div class="finance-change" style="color: var(--color-cta);">↑ 18.5%</div></div>
            <div class="finance-card"><div class="finance-icon purple"><i data-lucide="trending-up"></i></div><div class="finance-value">¥1.28M</div><div class="finance-label">应付分润</div><div class="finance-change">待结算</div></div>
            <div class="finance-card"><div class="finance-icon orange"><i data-lucide="banknote"></i></div><div class="finance-value">¥856K</div><div class="finance-label">平台服务费</div><div class="finance-change" style="color: var(--color-cta);">↑ 12.3%</div></div>
          </div>
          
          <div class="card">
            <div class="card-header"><div class="card-title">财务报表</div><button class="btn btn-secondary btn-sm"><i data-lucide="download"></i> 导出</button></div>
            <table class="data-table">
              <thead><tr><th>日期</th><th>类型</th><th>金额</th><th>状态</th><th>操作</th></tr></thead>
              <tbody>
                <tr><td>2024-01-15</td><td>商户分润</td><td style="font-family: var(--font-mono);">¥256,800</td><td><span class="tag tag-green">已结算</span></td><td><button class="btn btn-secondary btn-sm">详情</button></td></tr>
                <tr><td>2024-01-14</td><td>平台服务费</td><td style="font-family: var(--font-mono);">¥42,560</td><td><span class="tag tag-green">已结算</span></td><td><button class="btn btn-secondary btn-sm">详情</button></td></tr>
                <tr><td>2024-01-13</td><td>代理商分润</td><td style="font-family: var(--font-mono);">¥128,400</td><td><span class="tag tag-green">已结算</span></td><td><button class="btn btn-secondary btn-sm">详情</button></td></tr>
                <tr><td>2024-01-12</td><td>系统维护费</td><td style="font-family: var(--font-mono);">¥15,000</td><td><span class="tag tag-green">已结算</span></td><td><button class="btn btn-secondary btn-sm">详情</button></td></tr>
              </tbody>
            </table>
          </div>
          
          <div class="charts-grid" style="margin-top: var(--spacing-md);">
            <div class="chart-container"><div class="card-title">收入趋势</div><canvas id="incomeChart" height="200"></canvas></div>
            <div class="chart-container"><div class="card-title">支出构成</div><canvas id="expenseChart" height="200"></canvas></div>
          </div>
        `;
        setTimeout(() => {
          lucide.createIcons();
          charts.income = new Chart(document.getElementById('incomeChart'), {
            type: 'bar',
            data: { labels: ['1月', '2月', '3月', '4月', '5月', '6月'], datasets: [{ label: '收入(万元)', data: [680, 720, 850, 920, 1020, 1150], backgroundColor: '#10B981' }] },
            options: { responsive: true, plugins: { legend: { display: false } } }
          });
          charts.expense = new Chart(document.getElementById('expenseChart'), {
            type: 'doughnut',
            data: { labels: ['商户分润', '代理分润', '运营成本', '技术投入'], datasets: [{ data: [55, 20, 15, 10], backgroundColor: ['#6366F1', '#10B981', '#F59E0B', '#EC4899'] }] },
            options: { responsive: true }
          });
        }, 100);

      } else {
        content.innerHTML = `
          <div class="card">
            <div class="card-title">${pageId} 页面</div>
            <p style="margin-top: 16px; color: var(--color-text-muted);">该页面正在开发中，敬请期待...</p>
          </div>
        `;
        lucide.createIcons();
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      renderSidebar();
      renderPage('overview');
    });
  </script>
</body>
</html>
