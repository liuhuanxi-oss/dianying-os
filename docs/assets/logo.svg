<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 44">
  <defs>
    <!-- 三色渐变：indigo → violet → cyan -->
    <linearGradient id="logoGradMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="50%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#22D3EE"/>
    </linearGradient>
    <!-- 内层光晕渐变 -->
    <radialGradient id="logoGlow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </radialGradient>
    <!-- 外发光滤镜 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景圆角矩形容器 -->
  <rect x="0" y="4" width="36" height="36" rx="8" fill="url(#logoGradMain)" filter="url(#glow)"/>
  
  <!-- 内层光晕效果 -->
  <rect x="0" y="4" width="36" height="36" rx="8" fill="url(#logoGlow)"/>
  
  <!-- Multi-Agent 协同图形：3个圆点连线 -->
  <!-- 顶部大圆点 - 虚拟店长 -->
  <circle cx="18" cy="14" r="5" fill="white"/>
  <!-- 连接线 - 从虚拟店长到下方两个Agent -->
  <line x1="18" y1="19" x2="10" y2="28" stroke="white" stroke-width="1.5" stroke-opacity="0.7"/>
  <line x1="18" y1="19" x2="26" y2="28" stroke="white" stroke-width="1.5" stroke-opacity="0.7"/>
  <!-- 两个小圆点 - 子Agent -->
  <circle cx="10" cy="30" r="3.5" fill="white" fill-opacity="0.9"/>
  <circle cx="26" cy="30" r="3.5" fill="white" fill-opacity="0.9"/>
  
  <!-- 文字：店赢OS -->
  <text x="44" y="28" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-weight="800" font-size="20" fill="#0F172A" letter-spacing="0.5">店赢OS</text>
</svg>
