<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>店赢OS - BI智能分析</title>
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
  <script src="https://unpkg.com/lucide@0.263.1/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <style>
    /* ============================================
       BI分析仪表盘 - Metabase风格深色主题
       ============================================ */
    :root {
      --primary: #5094EF;
      --primary-hover: #3B82F6;
      --primary-bg: rgba(80, 148, 239, 0.1);
      
      --success: #88C75B;
      --success-bg: rgba(136, 199, 91, 0.1);
      --warning: #F5B041;
      --warning-bg: rgba(245, 176, 65, 0.1);
      --danger: #EE6B6E;
      --danger-bg: rgba(238, 107, 110, 0.1);
      --info: #7DAAF7;
      
      --bg-dark: #13131F;
      --bg-card: #1A1A2E;
      --bg-card-hover: #22223A;
      --bg-input: #16162A;
      
      --border: #2D2D44;
      --border-light: #3A3A52;
      
      --text-primary: #FFFFFF;
      --text-secondary: #A0A0B0;
      --text-muted: #6B6B7B;
      
      --shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg-dark);
      font-family: 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text-primary);
    }

    /* ============================================
       顶部导航栏
       ============================================ */
    /* 移动端菜单遮罩 */
    .bi-mobile-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 99;
    }
    .bi-mobile-overlay.active { display: block; }
    
    .bi-header {
      height: 60px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      position: relative;
      z-index: 100;
    }

    .bi-header-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .bi-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text-primary);
    }

    .bi-logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--primary), #7DAAF7);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .bi-logo-text {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .bi-nav-tabs {
      display: flex;
      gap: 4px;
    }

    .bi-nav-tab {
      padding: 8px 16px;
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      background: transparent;
    }

    .bi-nav-tab:hover {
      background: var(--bg-card-hover);
      color: var(--text-primary);
    }

    .bi-nav-tab.active {
      background: var(--primary-bg);
      color: var(--primary);
    }

    .bi-header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .bi-time-filter {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
    }

    .bi-refresh-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .bi-refresh-btn:hover {
      background: var(--bg-card-hover);
      color: var(--primary);
    }

    .bi-refresh-btn.loading svg {
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* ============================================
       主容器
       ============================================ */
    .bi-container {
      width: 100%;
      height: calc(100% - 60px);
      overflow-y: auto;
      padding: 20px 24px;
    }

    .bi-container::-webkit-scrollbar {
      width: 6px;
    }

    .bi-container::-webkit-scrollbar-track {
      background: var(--bg-dark);
    }

    .bi-container::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    /* ============================================
       KPI卡片区域
       ============================================ */
    .bi-kpi-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }

    .bi-kpi-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      transition: all 0.3s;
      animation: kpiFadeIn 0.5s ease-out both;
    }

    .bi-kpi-card:nth-child(1) { animation-delay: 0.05s; }
    .bi-kpi-card:nth-child(2) { animation-delay: 0.1s; }
    .bi-kpi-card:nth-child(3) { animation-delay: 0.15s; }
    .bi-kpi-card:nth-child(4) { animation-delay: 0.2s; }
    .bi-kpi-card:nth-child(5) { animation-delay: 0.25s; }

    @keyframes kpiFadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .bi-kpi-card:hover {
      border-color: var(--primary);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .bi-kpi-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .bi-kpi-label {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .bi-kpi-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bi-kpi-icon.blue { background: var(--primary-bg); color: var(--primary); }
    .bi-kpi-icon.green { background: var(--success-bg); color: var(--success); }
    .bi-kpi-icon.amber { background: var(--warning-bg); color: var(--warning); }
    .bi-kpi-icon.red { background: var(--danger-bg); color: var(--danger); }
    .bi-kpi-icon.purple { background: rgba(167, 139, 250, 0.1); color: #A78BFA; }

    .bi-kpi-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
      font-family: 'DIN Alternate', 'Roboto Mono', monospace;
      margin-bottom: 6px;
    }

    .bi-kpi-trend {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
    }

    .bi-kpi-trend.up { color: var(--success); }
    .bi-kpi-trend.down { color: var(--danger); }

    .bi-kpi-trend .compare {
      color: var(--text-muted);
      margin-left: 4px;
    }

    /* ============================================
       图表区域
       ============================================ */
    .bi-charts-grid {
      display: grid;
      gap: 20px;
      margin-bottom: 20px;
    }

    .bi-chart-row-2 {
      grid-template-columns: 2fr 1fr;
    }

    .bi-chart-row-equal {
      grid-template-columns: 1fr 1fr 1fr;
    }

    .bi-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      animation: cardFadeIn 0.5s ease-out both;
    }

    @keyframes cardFadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .bi-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .bi-card-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .bi-card-title .icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--primary-bg);
      color: var(--primary);
    }

    .bi-card-actions {
      display: flex;
      gap: 8px;
    }

    .bi-card-btn {
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      color: var(--text-secondary);
      background: transparent;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
    }

    .bi-card-btn:hover {
      background: var(--bg-card-hover);
      color: var(--text-primary);
    }

    .bi-card-btn.active {
      background: var(--primary-bg);
      color: var(--primary);
      border-color: var(--primary);
    }

    .bi-card-body {
      padding: 16px 20px;
    }

    .bi-chart-container {
      width: 100%;
      height: 280px;
    }

    .bi-chart-container.large {
      height: 320px;
    }

    .bi-chart-container.small {
      height: 200px;
    }

    /* ============================================
       AI问答模块
       ============================================ */
    .bi-ai-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      animation: cardFadeIn 0.5s ease-out both;
    }

    .bi-ai-input-area {
      display: flex;
      gap: 12px;
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }

    .bi-ai-input-wrapper {
      flex: 1;
      position: relative;
    }

    .bi-ai-input {
      width: 100%;
      padding: 14px 16px;
      padding-left: 44px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }

    .bi-ai-input:focus {
      border-color: var(--primary);
      background: var(--bg-card-hover);
    }

    .bi-ai-input::placeholder {
      color: var(--text-muted);
    }

    .bi-ai-input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }

    .bi-ai-send-btn {
      padding: 14px 24px;
      background: linear-gradient(135deg, var(--primary), #7DAAF7);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .bi-ai-send-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(80, 148, 239, 0.4);
    }

    .bi-ai-responses {
      max-height: 300px;
      overflow-y: auto;
    }

    .bi-ai-response-item {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .bi-ai-response-item:last-child {
      border-bottom: none;
    }

    .bi-ai-question {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 12px;
    }

    .bi-ai-question .q-icon {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--primary-bg);
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 12px;
      font-weight: 600;
    }

    .bi-ai-question-text {
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.6;
    }

    .bi-ai-answer {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 16px;
      background: var(--bg-card-hover);
      border-radius: 10px;
      margin-left: 34px;
    }

    .bi-ai-answer .a-icon {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--success), #6DB76D);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 12px;
    }

    .bi-ai-answer-text {
      color: var(--text-primary);
      font-size: 14px;
      line-height: 1.7;
    }

    .bi-ai-answer-text .highlight {
      color: var(--primary);
      font-weight: 600;
    }

    /* 快速问题标签 */
    .bi-quick-questions {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      background: var(--bg-input);
    }

    .bi-quick-questions-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .bi-quick-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .bi-quick-tag {
      padding: 6px 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-secondary);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .bi-quick-tag:hover {
      background: var(--primary-bg);
      color: var(--primary);
      border-color: var(--primary);
    }

    /* ============================================
       评分趋势图样式
       ============================================ */
    .bi-rating-cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .bi-rating-item {
      text-align: center;
      padding: 16px;
      background: var(--bg-card-hover);
      border-radius: 8px;
    }

    .bi-rating-platform {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .bi-rating-score {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .bi-rating-stars {
      color: var(--warning);
      font-size: 12px;
    }

    .bi-rating-change {
      font-size: 11px;
      margin-top: 4px;
    }

    .bi-rating-change.up { color: var(--success); }
    .bi-rating-change.down { color: var(--danger); }

    /* ============================================
       返回首页按钮
       ============================================ */
    .back-home-btn {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.3s;
      box-shadow: var(--shadow);
    }

    .back-home-btn:hover {
      background: var(--bg-card-hover);
      border-color: var(--primary);
      color: var(--primary);
      transform: translateY(-1px);
    }

    /* ============================================
       响应式适配
       ============================================ */
    @media (max-width: 1400px) {
      .bi-kpi-row { grid-template-columns: repeat(5, 1fr); }
      .bi-kpi-value { font-size: 24px; }
    }

    @media (max-width: 1200px) {
      .bi-kpi-row { grid-template-columns: repeat(3, 1fr); gap: 12px; }
      .bi-kpi-value { font-size: 22px; }
      .bi-charts-grid.bi-chart-row-2 { grid-template-columns: 1fr; }
      .bi-charts-grid.bi-chart-row-equal { grid-template-columns: 1fr 1fr; }
      .bi-rating-cards { grid-template-columns: repeat(2, 1fr); }
      .bi-chart-container { height: 260px; }
    }

    @media (max-width: 768px) {
      .bi-header { padding: 0 12px; }
      .bi-nav-tabs { display: none; }
      .bi-container { padding: 12px; }
      .bi-kpi-row { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .bi-kpi-card { padding: 14px; }
      .bi-kpi-value { font-size: 20px; }
      .bi-kpi-label { font-size: 12px; }
      .bi-kpi-icon { width: 28px; height: 28px; }
      .bi-charts-grid { gap: 12px; }
      .bi-charts-grid.bi-chart-row-equal { grid-template-columns: 1fr; }
      .bi-rating-cards { grid-template-columns: repeat(2, 1fr); }
      .bi-card-header { padding: 12px 14px; flex-wrap: wrap; gap: 8px; }
      .bi-card-title { font-size: 14px; }
      .bi-chart-container { height: 220px; }
      .bi-chart-container.large { height: 260px; }
      .bi-card-actions { width: 100%; overflow-x: auto; flex-wrap: nowrap; }
      .bi-card-btn { white-space: nowrap; }
      .bi-ai-input-area { flex-direction: column; padding: 14px; }
      .bi-ai-input { width: 100%; }
      .bi-quick-tags { flex-wrap: wrap; }
      .back-home-btn { top: auto; bottom: 16px; left: 16px; padding: 8px 12px; font-size: 12px; }
    }

    @media (max-width: 480px) {
      .bi-kpi-row { grid-template-columns: 1fr; }
      .bi-kpi-card { display: flex; flex-direction: row; align-items: center; justify-content: space-between; gap: 12px; }
      .bi-kpi-header { margin-bottom: 0; }
      .bi-kpi-trend { justify-content: flex-end; }
      .bi-chart-container { height: 200px; }
      .bi-ai-section { margin-top: 16px; }
    }
  </style>
</head>
<body>
  <!-- 顶部导航 -->
  <!-- 移动端遮罩 -->
    <div class="bi-mobile-overlay" id="biMobileOverlay"></div>

    <header class="bi-header">
    <div class="bi-header-left">
      <a href="index.html" class="bi-logo">
        <div class="bi-logo-icon">📊</div>
        <span class="bi-logo-text">BI智能分析</span>
      </a>
      <nav class="bi-nav-tabs">
        <button class="bi-nav-tab active" data-tab="dashboard">数据概览</button>
        <button class="bi-nav-tab" data-tab="sales">销售分析</button>
        <button class="bi-nav-tab" data-tab="customer">客户洞察</button>
        <button class="bi-nav-tab" data-tab="inventory">库存管理</button>
      </nav>
    </div>
    <div class="bi-header-right">
      <div class="bi-time-filter" id="timeFilter">
        <i data-lucide="calendar" style="width:14px;height:14px;"></i>
        <span>近30天</span>
        <i data-lucide="chevron-down" style="width:14px;height:14px;"></i>
      </div>
      <button class="bi-refresh-btn" id="refreshBtn" title="刷新数据">
        <i data-lucide="refresh-cw" style="width:18px;height:18px;"></i>
      </button>
    </div>
  </header>

  <!-- 返回首页 -->
  <a href="index.html" class="back-home-btn">
    <i data-lucide="arrow-left" style="width:14px;height:14px;"></i>
    返回首页
  </a>

  <!-- 主内容区 -->
  <main class="bi-container">
    <!-- ====== KPI指标卡片 ====== -->
    <div class="bi-kpi-row">
      <div class="bi-kpi-card">
        <div class="bi-kpi-header">
          <span class="bi-kpi-label">本月营收</span>
          <div class="bi-kpi-icon blue"><i data-lucide="trending-up"></i></div>
        </div>
        <div class="bi-kpi-value" id="kpiRevenue">¥0</div>
        <div class="bi-kpi-trend up">
          <i data-lucide="arrow-up" style="width:12px;height:12px;"></i>
          <span>+18.5%</span>
          <span class="compare">vs 上月</span>
        </div>
      </div>

      <div class="bi-kpi-card">
        <div class="bi-kpi-header">
          <span class="bi-kpi-label">订单总量</span>
          <div class="bi-kpi-icon green"><i data-lucide="shopping-bag"></i></div>
        </div>
        <div class="bi-kpi-value" id="kpiOrders">0</div>
        <div class="bi-kpi-trend up">
          <i data-lucide="arrow-up" style="width:12px;height:12px;"></i>
          <span>+12.3%</span>
          <span class="compare">vs 上月</span>
        </div>
      </div>

      <div class="bi-kpi-card">
        <div class="bi-kpi-header">
          <span class="bi-kpi-label">平均客单价</span>
          <div class="bi-kpi-icon amber"><i data-lucide="receipt"></i></div>
        </div>
        <div class="bi-kpi-value" id="kpiAvgOrder">¥0</div>
        <div class="bi-kpi-trend down">
          <i data-lucide="arrow-down" style="width:12px;height:12px;"></i>
          <span>-3.2%</span>
          <span class="compare">vs 上月</span>
        </div>
      </div>

      <div class="bi-kpi-card">
        <div class="bi-kpi-header">
          <span class="bi-kpi-label">综合评分</span>
          <div class="bi-kpi-icon purple"><i data-lucide="star"></i></div>
        </div>
        <div class="bi-kpi-value" id="kpiRating">0.0</div>
        <div class="bi-kpi-trend up">
          <i data-lucide="arrow-up" style="width:12px;height:12px;"></i>
          <span>+0.1</span>
          <span class="compare">vs 上月</span>
        </div>
      </div>

      <div class="bi-kpi-card">
        <div class="bi-kpi-header">
          <span class="bi-kpi-label">ROI投入产出比</span>
          <div class="bi-kpi-icon red"><i data-lucide="calculator"></i></div>
        </div>

    function animateValue(elementId, start, end, duration, prefix = '', decimals = 0, suffix = '') {
      const element = document.getElementById(elementId);
      if (!element) return;
      
      const startTime = performance.now();
      
      function update(currentTime) {
        const elapsed = currentTime - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const easeProgress = 1 - Math.pow(1 - progress, 3); // easeOutCubic
        const current = start + (end - start) * easeProgress;
        
        if (decimals > 0) {
          element.textContent = prefix + current.toFixed(decimals) + suffix;
        } else {
          element.textContent = prefix + Math.round(current).toLocaleString() + suffix;
        }
        
        if (progress < 1) {
          requestAnimationFrame(update);
        }
      }
      
      requestAnimationFrame(update);
    }

            type: 'line',
            data: trend['饿了么'],
            smooth: true,
            symbol: 'none',
            lineStyle: { color: '#F5B041', width: 2 },
            areaStyle: { color: 'rgba(245, 176, 65, 0.1)' }
          }
        ]
      };
      
      chart.setOption(option);
      window.addEventListener('resize', () => chart.resize());
    }

    // 热销产品TOP5
    function initProductTopChart() {
      const chartDom = document.getElementById('productTopChart');
      if (!chartDom || !echarts) return;
      
      const chart = echarts.init(chartDom);
      const data = BIData.productTop;
      
      const option = {
        tooltip: {
          trigger: 'axis',
          axisPointer: { type: 'shadow' },
          backgroundColor: 'rgba(26, 26, 46, 0.95)',
          borderColor: '#2D2D44',
          textStyle: { color: '#fff' },
          formatter: function(params) {
            const d = data[params[0].dataIndex];
            return `<div style="font-size:12px;">
              <div style="font-weight:600;margin-bottom:4px;">${d.name}</div>
              <div>销量: ${d.sales.toLocaleString()}份</div>
              <div>营收: ¥${d.revenue.toLocaleString()}</div>
              <div style="color:${d.growth >= 0 ? '#88C75B' : '#EE6B6E'}">
                增长率: ${d.growth >= 0 ? '+' : ''}${d.growth}%
              </div>
            </div>`;
          }
        },
        grid: {
          left: '3%',
          right: '12%',
          bottom: '3%',
          top: '5px',
          containLabel: true
        },
        xAxis: {
          type: 'value',
          axisLine: { show: false },
          axisLabel: { show: false },
          splitLine: { show: false }
        },
        yAxis: {
          type: 'category',
          data: data.map(d => d.name).reverse(),
          axisLine: { show: false },
          axisTick: { show: false },
          axisLabel: { color: '#A0A0B0', fontSize: 12 }
        },
        series: [{
          type: 'bar',
          data: data.map(d => ({
            value: d.sales,
            itemStyle: {
              color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
                { offset: 0, color: '#5094EF' },
                { offset: 1, color: '#7DAAF7' }
              ]),
              borderRadius: [0, 4, 4, 0]
            }
          })).reverse(),
          barWidth: 20,
          label: {
            show: true,
            position: 'right',
            formatter: '{c}',
            color: '#A0A0B0',
            fontSize: 11
          }
        }]
      };
      
      chart.setOption(option);
      window.addEventListener('resize', () => chart.resize());
    }

    // 库存预警图
    function initInventoryAlertChart() {
      const chartDom = document.getElementById('inventoryAlertChart');
      if (!chartDom || !echarts) return;
      
      const chart = echarts.init(chartDom);
      const data = BIData.inventoryAlerts;
      
      const option = {
        tooltip: {
          trigger: 'axis',
          axisPointer: { type: 'shadow' },
          backgroundColor: 'rgba(26, 26, 46, 0.95)',
          borderColor: '#2D2D44',
          textStyle: { color: '#fff' },
          formatter: function(params) {
            const d = data[params[0].dataIndex];
            const pct = Math.round(d.current / d.min * 100);
            return `<div style="font-size:12px;">
              <div style="font-weight:600;margin-bottom:4px;">${d.name}</div>
              <div>当前: ${d.current}${d.unit} / 安全: ${d.min}${d.unit}</div>
              <div style="color:${d.urgency === 'high' ? '#EE6B6E' : d.urgency === 'medium' ? '#F5B041' : '#88C75B'}">
                库存率: ${pct}% ${d.urgency === 'high' ? '⚠️紧急' : ''}
              </div>
            </div>`;
          }
        },
        grid: {
          left: '3%',
          right: '8%',
          bottom: '3%',
          top: '5px',
          containLabel: true
        },
        xAxis: {
          type: 'value',
          axisLine: { show: false },
          axisLabel: { show: false },
          splitLine: { show: false }
        },
        yAxis: {
          type: 'category',
          data: data.map(d => d.name).reverse(),
          axisLine: { show: false },
          axisTick: { show: false },
          axisLabel: { color: '#A0A0B0', fontSize: 11 }
        },
        series: [
          {
            name: '当前库存',
            type: 'bar',
            data: data.map(d => ({
              value: d.current,
              itemStyle: {
                color: d.urgency === 'high' ? '#EE6B6E' : d.urgency === 'medium' ? '#F5B041' : '#88C75B',
                borderRadius: [0, 4, 4, 0]
              }
            })).reverse(),
            barWidth: 16,
            label: {
              show: true,
              position: 'right',
              formatter: function(p) {
                const d = data[p.dataIndex];
                return d.current + d.unit;
              },
              color: '#A0A0B0',
              fontSize: 10
            }
          },
          {
            name: '安全线',
            type: 'bar',
            data: data.map(d => d.min).reverse(),
            barWidth: 2,
            itemStyle: { color: 'rgba(255,255,255,0.1)', borderRadius: [0, 4, 4, 0] },
            z: -1
          }
        ]
      };
      
      chart.setOption(option);
      window.addEventListener('resize', () => chart.resize());
    }

    // 初始化评分卡片
    function initRatingCards() {
      const container = document.getElementById('ratingCards');
      if (!container) return;
      
      container.innerHTML = BIData.platformRatings.map(r => `
        <div class="bi-rating-item">
          <div class="bi-rating-platform">${r.platform}</div>
          <div class="bi-rating-score">${r.score}</div>
          <div class="bi-rating-stars">${'★'.repeat(r.stars)}</div>
          <div class="bi-rating-change ${r.change.startsWith('+') ? 'up' : r.change.startsWith('-') ? 'down' : ''}">
            ${r.change.startsWith('+') ? '↑' : r.change.startsWith('-') ? '↓' : ''} ${r.total.toLocaleString()}条
          </div>
        </div>
      `).join('');
    }

    // 初始化AI问答
    function initAIChat() {
      const responsesContainer = document.getElementById('aiResponses');
      
      // 添加预设问答
      addAIResponse('本月营收趋势如何？', AIAnswers['本月营收趋势如何？']);
      addAIResponse('哪些时段订单量最高？', AIAnswers['哪些时段订单量最高？']);
    }

    function addAIResponse(question, answer) {
      const container = document.getElementById('aiResponses');
      if (!container) return;
      
      const html = `
        <div class="bi-ai-response-item">
          <div class="bi-ai-question">
            <div class="q-icon">Q</div>
            <div class="bi-ai-question-text">${question}</div>
          </div>
          <div class="bi-ai-answer">
            <div class="a-icon">A</div>
            <div class="bi-ai-answer-text">${answer.answer}</div>
          </div>
        </div>
      `;
      
      container.insertAdjacentHTML('beforeend', html);
    }

    // 绑定事件
    function bindEvents() {
      // 刷新按钮
      document.getElementById('refreshBtn').addEventListener('click', function() {
        this.classList.add('loading');
        setTimeout(() => {
          this.classList.remove('loading');
          // 重新初始化数据动画
          initKPICounters();
          // 刷新图表
          initCharts();
        }, 1000);
      });

      // AI发送按钮
      document.getElementById('aiSendBtn').addEventListener('click', handleAIQuery);
      
      // AI输入框回车
      document.getElementById('aiQueryInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') handleAIQuery();
      });

      // 快捷问题标签
      document.querySelectorAll('.bi-quick-tag').forEach(tag => {
        tag.addEventListener('click', function() {
          const q = this.dataset.q;
          document.getElementById('aiQueryInput').value = q;
          handleAIQuery();
        });
      });

      // 时间段切换
      document.querySelectorAll('[data-period]').forEach(btn => {
        btn.addEventListener('click', function() {
          document.querySelectorAll('[data-period]').forEach(b => b.classList.remove('active'));
          this.classList.add('active');
          // 模拟切换数据
          const period = this.dataset.period;
          updateChartData(period);
        });
      });

      // Tab切换
      document.querySelectorAll('.bi-nav-tab').forEach(tab => {
        tab.addEventListener('click', function() {
          document.querySelectorAll('.bi-nav-tab').forEach(t => t.classList.remove('active'));
          this.classList.add('active');
        });
      });
    }

    // 处理AI查询
    function handleAIQuery() {
      const input = document.getElementById('aiQueryInput');
      const question = input.value.trim();
      
      if (!question) return;
      
      // 检查是否有预设答案
      let matchedAnswer = null;
      for (const [key, value] of Object.entries(AIAnswers)) {
        if (question.includes(key.split('？')[0]) || key.includes(question.split('？')[0])) {
          matchedAnswer = value;
          break;
        }
      }
      
      // 如果没有匹配，返回通用回答
      if (!matchedAnswer) {
        matchedAnswer = {
          answer: `正在分析您的问题："<span class="highlight">${question}</span>"

根据现有数据初步判断，您可能关注的是运营优化方向。建议：

• 查看数据报表获取详细分析
• 使用筛选功能精确定位问题
• 联系客服获取专业指导

如需深入分析，请提供更具体的问题描述。`,
          insights: ['数据正在分析中', '建议细化查询条件']
        };
      }
      
      addAIResponse(question, matchedAnswer);
      input.value = '';
      
      // 滚动到底部
      const container = document.getElementById('aiResponses');
      container.scrollTop = container.scrollHeight;
    }

    // 更新图表数据（模拟）
    function updateChartData(period) {
      // 简化实现：重新初始化图表即可
      const days = period === '7d' ? 7 : period === '30d' ? 30 : 90;
      document.getElementById('revenueTrendChart').innerHTML = '';
      initRevenueTrendChart();
    }
  </script>
