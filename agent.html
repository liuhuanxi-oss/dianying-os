<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>店赢OS - 代理商端</title>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --color-primary: #6366F1;
      --color-primary-light: #818CF8;
      --color-cta: #10B981;
      --color-cta-hover: #059669;
      --color-bg: #F5F3FF;
      --color-card: #FFFFFF;
      --color-text: #1E1B4B;
      --color-text-secondary: #6366F1;
      --color-text-muted: #94A3B8;
      --color-border: #E2E8F0;
      --color-sidebar: #1E1B4B;
      --color-sidebar-hover: #2D2A5E;
      --color-danger: #EF4444;
      --color-warning: #F59E0B;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: 'Fira Code', monospace;
      --radius: 12px;
      --radius-sm: 8px;
      --spacing-sm: 8px;
      --spacing-md: 16px;
      --spacing-lg: 24px;
      --transition: 200ms ease;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    body { 
      font-family: var(--font-sans); 
      background: var(--color-bg); 
      color: var(--color-text);
      line-height: 1.6;
    }

    :focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: 2px;
    }

    .app-layout { display: flex; min-height: 100vh; }
    
    .sidebar { 
      width: 260px; 
      background: var(--color-sidebar); 
      color: white; 
      display: flex; 
      flex-direction: column; 
      position: fixed; 
      top: 0; 
      left: 0; 
      bottom: 0; 
      z-index: 100;
    }
    .sidebar-header { 
      padding: var(--spacing-lg) var(--spacing-md); 
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-icon { 
      width: 40px; 
      height: 40px; 
      background: var(--color-warning);
      border-radius: var(--radius-sm); 
      display: flex; 
      align-items: center; 
      justify-content: center;
      color: white;
    }
    .logo-title { font-size: 1.2rem; font-weight: 700; }
    .logo-subtitle { font-size: 0.75rem; color: var(--color-text-muted); }
    
    .sidebar-menu { flex: 1; overflow-y: auto; padding: var(--spacing-md) 0; }
    .menu-section { margin-bottom: var(--spacing-lg); }
    .menu-section-title { 
      padding: 0 var(--spacing-md) var(--spacing-sm); 
      font-size: 0.7rem; 
      color: var(--color-text-muted); 
      text-transform: uppercase; 
      letter-spacing: 0.05em; 
      font-weight: 600; 
    }
    .menu-item { 
      display: flex; 
      align-items: center; 
      gap: 12px; 
      padding: 10px var(--spacing-md); 
      cursor: pointer; 
      transition: background var(--transition), color var(--transition);
      color: var(--color-text-muted);
    }
    .menu-item:hover { background: var(--color-sidebar-hover); color: white; }
    .menu-item.active { background: var(--color-warning); color: white; }
    
    .sidebar-footer { 
      padding: var(--spacing-md); 
      border-top: 1px solid rgba(255,255,255,0.1); 
    }
    .user-info { display: flex; align-items: center; gap: 12px; }
    .user-avatar { 
      width: 36px; 
      height: 36px; 
      background: var(--color-warning); 
      border-radius: 50%; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      color: white;
    }
    .user-name { font-weight: 600; font-size: 0.9rem; }
    .user-role { font-size: 0.75rem; color: var(--color-text-muted); }
    
    .main-content { 
      flex: 1; 
      margin-left: 260px; 
      display: flex; 
      flex-direction: column; 
      min-height: 100vh; 
    }
    .header { 
      height: 64px; 
      background: var(--color-card); 
      border-bottom: 1px solid var(--color-border); 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      padding: 0 var(--spacing-lg);
    }
    .page-title { font-size: 1.1rem; font-weight: 600; color: var(--color-text); }
    .content-area { flex: 1; padding: var(--spacing-lg); overflow-y: auto; }
    
    .card { 
      background: var(--color-card); 
      border-radius: var(--radius); 
      padding: var(--spacing-lg); 
      margin-bottom: var(--spacing-md);
      border: 1px solid var(--color-border);
    }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-md); }
    .card-title { font-size: 1rem; font-weight: 600; color: var(--color-text); }
    
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--spacing-md); }
    .stat-card { 
      background: var(--color-card); 
      border-radius: var(--radius); 
      padding: var(--spacing-lg); 
      border: 1px solid var(--color-border);
    }
    .stat-value { font-size: 2rem; font-weight: 700; color: var(--color-text); font-family: var(--font-mono); }
    .stat-label { font-size: 0.85rem; color: var(--color-text-muted); margin-top: 4px; }
    .stat-trend { font-size: 0.8rem; margin-top: var(--spacing-sm); }
    .stat-trend.up { color: var(--color-cta); }
    .stat-trend.down { color: var(--color-danger); }
    
    .charts-grid { display: grid; grid-template-columns: 2fr 1fr; gap: var(--spacing-md); margin-top: var(--spacing-md); }
    .chart-container { 
      background: var(--color-card); 
      border-radius: var(--radius); 
      padding: var(--spacing-lg); 
      border: 1px solid var(--color-border);
    }
    
    .btn { 
      display: inline-flex; 
      align-items: center; 
      gap: 6px; 
      padding: 10px 16px; 
      border-radius: var(--radius-sm); 
      font-size: 0.875rem; 
      font-weight: 500; 
      cursor: pointer; 
      border: none; 
      transition: all var(--transition);
    }
    .btn-primary { background: var(--color-primary); color: white; }
    .btn-primary:hover { background: var(--color-primary-light); }
    .btn-secondary { background: var(--color-card); color: var(--color-text); border: 1px solid var(--color-border); }
    .btn-secondary:hover { background: var(--color-bg); }
    .btn-warning { background: var(--color-warning); color: white; }
    .btn-sm { padding: 6px 12px; font-size: 0.8rem; }
    
    .tag { cursor: pointer;
      display: inline-flex; 
      align-items: center; 
      padding: 4px 10px; 
      border-radius: 20px; 
      font-size: 0.75rem; 
      font-weight: 500; 
    }
    .tag-green { background: #DCFCE7; color: #15803D; }
    .tag-blue { background: #DBEAFE; color: #1D4ED8; }
    .tag-yellow { background: #FEF3C7; color: #B45309; }
    .tag-gray { background: var(--color-bg); color: var(--color-text-muted); }
    .tag-orange { background: #FFF7ED; color: #C2410C; }
    
    /* Table */
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th { text-align: left; padding: 12px; background: var(--color-bg); font-weight: 600; font-size: 0.85rem; color: var(--color-text-muted); }
    .data-table td { padding: 12px; border-bottom: 1px solid var(--color-border); }
    .data-table tr:hover td { background: var(--color-bg); }
    
    /* Merchant list */
    .merchant-list { display: flex; flex-direction: column; gap: var(--spacing-sm); }
    .merchant-item { cursor: pointer;
      display: flex; 
      align-items: center; 
      padding: var(--spacing-md); 
      background: var(--color-card); 
      border: 1px solid var(--color-border); 
      border-radius: var(--radius-sm);
      transition: all var(--transition);
      cursor: pointer;
    }
    .merchant-item:hover { border-color: var(--color-primary); }
    .merchant-avatar { 
      width: 48px; 
      height: 48px; 
      border-radius: var(--radius-sm); 
      background: var(--color-bg); 
      display: flex; 
      align-items: center; 
      justify-content: center;
      color: var(--color-text-muted);
      margin-right: var(--spacing-md);
    }
    .merchant-info { flex: 1; }
    .merchant-name { font-weight: 600; margin-bottom: 4px; }
    .merchant-meta { font-size: 0.8rem; color: var(--color-text-muted); }
    .merchant-stats { display: flex; gap: 24px; text-align: right; }
    .merchant-stat-value { font-weight: 600; font-family: var(--font-mono); }
    .merchant-stat-label { font-size: 0.75rem; color: var(--color-text-muted); }
    
    /* Commission card */
    .commission-card { 
      background: linear-gradient(135deg, var(--color-warning), #D97706); 
      border-radius: var(--radius); 
      padding: var(--spacing-lg); 
      color: white;
      margin-bottom: var(--spacing-md);
    }
    .commission-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-md); }
    .commission-title { font-size: 0.9rem; opacity: 0.9; }
    .commission-badge { background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; }
    .commission-value { font-size: 2.5rem; font-weight: 700; font-family: var(--font-mono); }
    .commission-change { font-size: 0.85rem; opacity: 0.9; margin-top: 4px; }
    .commission-breakdown { display: flex; gap: var(--spacing-lg); margin-top: var(--spacing-md); padding-top: var(--spacing-md); border-top: 1px solid rgba(255,255,255,0.2); }
    .breakdown-item { text-align: center; }
    .breakdown-value { font-size: 1.25rem; font-weight: 600; font-family: var(--font-mono); }
    .breakdown-label { font-size: 0.75rem; opacity: 0.8; margin-top: 2px; }
    
    /* Performance chart */
    .performance-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--spacing-md); margin-top: var(--spacing-md); }
    .performance-card { 
      background: var(--color-card); 
      border-radius: var(--radius); 
      padding: var(--spacing-lg); 
      border: 1px solid var(--color-border);
      text-align: center;
    }
    .performance-icon { 
      width: 48px; 
      height: 48px; 
      border-radius: 50%; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      margin: 0 auto var(--spacing-sm);
    }
    .performance-icon.blue { background: #DBEAFE; color: #1D4ED8; }
    .performance-icon.green { background: #DCFCE7; color: #15803D; }
    .performance-icon.purple { background: #F3E8FF; color: #7C3AED; }
    .performance-icon.orange { background: #FEF3C7; color: #B45309; }
    .performance-value { font-size: 1.5rem; font-weight: 700; font-family: var(--font-mono); }
    .performance-label { font-size: 0.85rem; color: var(--color-text-muted); margin-top: 4px; }
    
    /* Toast */
    .toast { 
      position: fixed; 
      bottom: var(--spacing-lg); 
      right: var(--spacing-lg); 
      padding: 12px 20px; 
      background: var(--color-text); 
      color: white; 
      border-radius: var(--radius-sm); 
      z-index: 2000; 
      animation: slideIn 0.3s ease-out;
    }
    .toast.success { background: var(--color-cta); }
    @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    
    @media (max-width: 1024px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .performance-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .main-content { margin-left: 0; }
      .stats-grid { grid-template-columns: 1fr; }
      .charts-grid { grid-template-columns: 1fr; }
      .performance-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon"><i data-lucide="users"></i></div>
          <div>
            <div class="logo-title">店赢OS</div>
            <div class="logo-subtitle">代理商端</div>
          </div>
        </div>
      </div>
      <div class="sidebar-menu" id="sidebar-menu"></div>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar"><i data-lucide="user"></i></div>
          <div>
            <div class="user-name">演示代理</div>
            <div class="user-role">金牌代理商</div>
          </div>
        </div>
      </div>
    </div>
    
    <div class="main-content">
      <div class="header">
        <div class="page-title" id="pageTitle">我的商户</div>
        <div class="header-actions" id="headerActions"></div>
      </div>
      <div class="content-area" id="contentArea"></div>
    </div>
  </div>

  <script>
    const menuConfig = [
      { section: '业务管理', items: [
        { id: 'merchants', name: '我的商户', icon: 'store' },
        { id: 'stats', name: '业绩统计', icon: 'bar-chart-2' },
        { id: 'commission', name: '分润查看', icon: 'dollar-sign' }
      ]},
      { section: '客户管理', items: [
        { id: 'customers', name: '客户管理', icon: 'users' },
        { id: 'reports', name: '数据报表', icon: 'file-text' }
      ]}
    ];

    let currentPage = 'merchants';
    let charts = {};

    const myMerchants = [
      { id: 1, name: '川味坊', category: '川菜', location: '朝阳区', monthlySales: '¥328,560', orders: 2856, rating: 4.9, status: 'active', commission: '¥9,857', joinDate: '2023-03-15' },
      { id: 2, name: '湘江楼', category: '湘菜', location: '海淀区', monthlySales: '¥286,340', orders: 2456, rating: 4.8, status: 'active', commission: '¥8,590', joinDate: '2023-04-22' },
      { id: 3, name: '粤式茶餐厅', category: '粤菜', location: '西城区', monthlySales: '¥245,780', orders: 2134, rating: 4.7, status: 'active', commission: '¥7,373', joinDate: '2023-05-08' },
      { id: 4, name: '老北京涮肉', category: '火锅', location: '东城区', monthlySales: '¥198,560', orders: 1789, rating: 4.6, status: 'active', commission: '¥5,957', joinDate: '2023-06-18' },
      { id: 5, name: '日式料理', category: '日料', location: '朝阳区', monthlySales: '¥176,890', orders: 1523, rating: 4.9, status: 'active', commission: '¥5,307', joinDate: '2023-07-25' },
      { id: 6, name: '韩式烤肉', category: '韩餐', location: '海淀区', monthlySales: '¥165,340', orders: 1432, rating: 4.5, status: 'active', commission: '¥4,960', joinDate: '2023-08-12' },
      { id: 7, name: '西餐厅', category: '西餐', location: '西城区', monthlySales: '¥145,670', orders: 1234, rating: 4.7, status: 'active', commission: '¥4,370', joinDate: '2023-09-03' },
      { id: 8, name: '咖啡馆', category: '饮品', location: '朝阳区', monthlySales: '¥98,450', orders: 2134, rating: 4.8, status: 'active', commission: '¥2,954', joinDate: '2023-10-15' }
    ];

    const commissionHistory = [
      { id: 'COM001', merchant: '川味坊', amount: '¥9,857', rate: '3%', date: '2024-01-15', status: '已结算' },
      { id: 'COM002', merchant: '湘江楼', amount: '¥8,590', rate: '3%', date: '2024-01-15', status: '已结算' },
      { id: 'COM003', merchant: '粤式茶餐厅', amount: '¥7,373', rate: '3%', date: '2024-01-15', status: '已结算' },
      { id: 'COM004', merchant: '老北京涮肉', amount: '¥5,957', rate: '3%', date: '2024-01-14', status: '已结算' },
      { id: 'COM005', merchant: '日式料理', amount: '¥5,307', rate: '3%', date: '2024-01-14', status: '处理中' }
    ];

    function renderSidebar() {
      const menuEl = document.getElementById('sidebar-menu');
      let html = '';
      menuConfig.forEach(section => {
        html += `<div class="menu-section"><div class="menu-section-title">${section.section}</div>`;
        section.items.forEach(item => {
          const isActive = currentPage === item.id ? 'active' : '';
          html += `<div class="menu-item ${isActive}" onclick="navigateTo('${item.id}', '${item.name}')" role="button" tabindex="0"><i data-lucide="${item.icon}"></i><span>${item.name}</span></div>`;
        });
        html += `</div>`;
      });
      menuEl.innerHTML = html;
      lucide.createIcons();
    }

    function navigateTo(pageId, pageName) {
      Object.values(charts).forEach(chart => chart.destroy());
      charts = {};
      currentPage = pageId;
      document.getElementById('pageTitle').textContent = pageName;
      renderSidebar();
      renderPage(pageId);
      lucide.createIcons();
    }

    function showToast(message, type = 'default') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function renderPage(pageId) {
      const content = document.getElementById('contentArea');
      
      if (pageId === 'merchants') {
        content.innerHTML = `
          <div class="stats-grid">
            <div class="stat-card"><div class="stat-value">156</div><div class="stat-label">我的商户数</div><div class="stat-trend up">↑ 12 本月新增</div></div>
            <div class="stat-card"><div class="stat-value">¥2.8M</div><div class="stat-label">本月交易额</div><div class="stat-trend up">↑ 22.5% 较上月</div></div>
            <div class="stat-card"><div class="stat-value">¥86,500</div><div class="stat-label">本月分润</div><div class="stat-trend up">↑ 18.3% 较上月</div></div>
            <div class="stat-card"><div class="stat-value">98.2%</div><div class="stat-label">商户活跃率</div><div class="stat-trend up">健康</div></div>
          </div>
          
          <div class="card" style="margin-top: var(--spacing-md);">
            <div class="card-header">
              <div class="card-title">商户列表</div>
              <div style="display: flex; gap: 8px;">
                <button class="btn btn-secondary btn-sm"><i data-lucide="search"></i> 搜索</button>
                <button class="btn btn-primary btn-sm"><i data-lucide="plus"></i> 添加商户</button>
              </div>
            </div>
            <div style="display: flex; gap: 12px; margin-bottom: 16px;">
              <span class="tag tag-orange" style="cursor: pointer;">全部 156</span>
              <span class="tag tag-gray" style="cursor: pointer;">活跃 142</span>
              <span class="tag tag-gray" style="cursor: pointer;">待审核 8</span>
              <span class="tag tag-gray" style="cursor: pointer;">已冻结 6</span>
            </div>
            <div class="merchant-list">
              ${myMerchants.map(m => `
                <div class="merchant-item" onclick="showToast('查看 ${m.name} 详情')">
                  <div class="merchant-avatar"><i data-lucide="store"></i></div>
                  <div class="merchant-info">
                    <div class="merchant-name">${m.name}</div>
                    <div class="merchant-meta">${m.category} · ${m.location} · ${m.joinDate}入驻</div>
                  </div>
                  <div class="merchant-stats">
                    <div><div class="merchant-stat-value">${m.monthlySales}</div><div class="merchant-stat-label">月交易</div></div>
                    <div><div class="merchant-stat-value">${m.orders.toLocaleString()}</div><div class="merchant-stat-label">订单</div></div>
                    <div><div class="merchant-stat-value">${m.rating}</div><div class="merchant-stat-label">评分</div></div>
                    <div><div class="merchant-stat-value" style="color: var(--color-cta);">${m.commission}</div><div class="merchant-stat-label">月分润</div></div>
                  </div>
                  <span class="tag tag-green" style="margin-left: 16px;">活跃</span>
                </div>
              `).join('')}
            </div>
          </div>
        `;
        lucide.createIcons();

      } else if (pageId === 'stats') {
        content.innerHTML = `
          <div class="stats-grid">
            <div class="stat-card"><div class="stat-value">¥32.5M</div><div class="stat-label">累计交易额</div><div class="stat-trend up">↑ 25.6% 本年</div></div>
            <div class="stat-card"><div class="stat-value">¥975K</div><div class="stat-label">累计分润</div><div class="stat-trend up">↑ 22.3% 本年</div></div>
            <div class="stat-card"><div class="stat-value">156</div><div class="stat-label">服务商户</div><div class="stat-trend up">↑ 12 本月</div></div>
            <div class="stat-card"><div class="stat-value">¥6,250</div><div class="stat-label">户均贡献</div><div class="stat-trend up">↑ 8.5%</div></div>
          </div>
          
          <div class="charts-grid" style="margin-top: var(--spacing-md);">
            <div class="chart-container"><div class="card-title">近6个月业绩趋势</div><canvas id="performanceChart" height="250"></canvas></div>
            <div class="chart-container"><div class="card-title">商户行业分布</div><canvas id="industryChart" height="250"></canvas></div>
          </div>
          
          <div class="performance-grid">
            <div class="performance-card">
              <div class="performance-icon blue"><i data-lucide="trending-up"></i></div>
              <div class="performance-value">+28.5%</div>
              <div class="performance-label">交易额增长率</div>
            </div>
            <div class="performance-card">
              <div class="performance-icon green"><i data-lucide="users"></i></div>
              <div class="performance-value">156</div>
              <div class="performance-label">活跃商户数</div>
            </div>
            <div class="performance-card">
              <div class="performance-icon purple"><i data-lucide="star"></i></div>
              <div class="performance-value">4.7</div>
              <div class="performance-label">平均评分</div>
            </div>
            <div class="performance-card">
              <div class="performance-icon orange"><i data-lucide="target"></i></div>
              <div class="performance-value">¥2.8M</div>
              <div class="performance-label">本月目标完成</div>
            </div>
          </div>
          
          <div class="card" style="margin-top: var(--spacing-md);">

            options: { responsive: true }

                ${commissionHistory.map(c => `
                  <tr>
                    <td style="font-family: var(--font-mono);">${c.id}</td>
                    <td>${c.merchant}</td>
                    <td style="font-family: var(--font-mono); color: var(--color-cta);">${c.amount}</td>
                    <td>${c.rate}</td>
                    <td>${c.date}</td>
                    <td><span class="tag ${c.status === '已结算' ? 'tag-green' : 'tag-yellow'}">${c.status}</span></td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `;

          lucide.createIcons();

                <tr><td>外婆家</td><td>江浙菜</td><td>刘总</td><td><span class="tag tag-yellow">中</span></td><td>2024-01-12</td><td><span class="tag tag-gray">已签约</span></td><td><button class="btn btn-secondary btn-sm">详情</button></td></tr>

        `;

      } else {

    }

    document.addEventListener('DOMContentLoaded', function() {
      renderSidebar();
      renderPage('merchants');

  </script>
