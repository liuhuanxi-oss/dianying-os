# docker-compose.yml - 店赢OS完整部署
# Usage: docker-compose up -d

version: '3.8'

services:
  # 后端API服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dianying-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DEBUG=false
      - WECOM_WEBHOOK_URL=${WECOM_WEBHOOK_URL:-}
    volumes:
      - ./backend:/app
      - backend-data:/app/uploads
    networks:
      - dianying-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: dianying-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./dianying-os:/usr/share/nginx/html:ro
      - nginx-logs:/var/log/nginx
      - ./ssl:/etc/nginx/ssl:ro  # 可选：SSL证书
    depends_on:
      - backend
    networks:
      - dianying-network

volumes:
  backend-data:
  nginx-logs:

networks:
  dianying-network:
    driver: bridge
