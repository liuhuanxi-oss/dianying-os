<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>店赢OS - 商户智能管理系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4338ca;
            --primary-light: #6366f1;
            --primary-dark: #3730a3;
            --accent: #059669;
            --accent-light: #10b981;
            --accent-dark: #047857;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-card-hover: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: #334155;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
        }
        
        .login-left {
            flex: 1;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 50%, var(--accent) 100%);
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        .login-left::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: pulse 8s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.3; }
        }
        
        .login-left-content {
            position: relative;
            z-index: 1;
        }
        
        .logo {
            font-size: 48px;
            font-weight: 800;
            color: white;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .logo-icon {
            width: 70px;
            height: 70px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }
        
        .login-left h1 {
            font-size: 42px;
            color: white;
            margin-bottom: 20px;
            line-height: 1.3;
        }
        
        .login-left p {
            font-size: 18px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 50px;
        }
        
        .features-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .feature-item {
            display: flex;
            align-items: center;
            gap: 15px;
            color: rgba(255,255,255,0.9);
            font-size: 16px;
        }
        
        .feature-icon {
            width: 45px;
            height: 45px;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .login-right {
            width: 500px;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .login-form {
            max-width: 380px;
            margin: 0 auto;
            width: 100%;
        }
        
        .login-form h2 {
            font-size: 28px;
            color: var(--text-primary);
            margin-bottom: 10px;
        }
        
        .login-form .subtitle {
            color: var(--text-secondary);
            margin-bottom: 40px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            color: var(--text-secondary);
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        .input-wrapper {
            position: relative;
        }
        
        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }
        
        .form-input {
            width: 100%;
            padding: 16px 16px 16px 50px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }
        
        .form-input::placeholder {
            color: var(--text-muted);
        }
        
        .verify-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .verify-btn:hover {
            background: var(--primary-light);
        }
        
        .verify-btn:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
        }
        
        .login-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(5, 150, 105, 0.3);
        }
        
        .demo-btn {
            width: 100%;
            padding: 16px;
            background: transparent;
            color: var(--primary-light);
            border: 2px solid var(--primary);
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
        }
        
        .demo-btn:hover {
            background: var(--primary);
            color: white;
        }
        
        .divider {
            display: flex;
            align-items: center;
            margin: 30px 0;
            color: var(--text-muted);
            font-size: 14px;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        
        .divider span {
            padding: 0 20px;
        }
        
        .pricing-preview {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 25px;
            margin-top: 30px;
            border: 1px solid var(--border);
        }
        
        .pricing-preview h4 {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 15px;
        }
        
        .pricing-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        
        .pricing-card {
            background: var(--bg-dark);
            border-radius: 10px;
            padding: 15px 10px;
            text-align: center;
        }
        
        .pricing-card.featured {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
        }
        
        .pricing-card .price {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .pricing-card.featured .price {
            color: white;
        }
        
        .pricing-card .period {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 3px;
        }
        
        .pricing-card.featured .period {
            color: rgba(255,255,255,0.8);
        }
        
        .pricing-card .name {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 5px;
        }
        
        .pricing-card.featured .name {
            color: white;
        }
    </style>
</head>
<body>
    <div class="login-left">
        <div class="login-left-content">
            <div class="logo">
                <div class="logo-icon">🏪</div>
                <span>店赢OS</span>
            </div>
            <h1>商户智能<br>管理系统</h1>
            <p>8大平台统一管理 · AI智能运营 · 自动对账</p>
            
            <div class="features-list">
                <div class="feature-item">
                    <div class="feature-icon">🤖</div>
                    <span>AI差评自动处理 · 再也不怕差评</span>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">💹</div>
                    <span>竞品智能定价 · 订单自动增长</span>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">📱</div>
                    <span>8平台统一管理 · 一个后台搞定</span>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">📊</div>
                    <span>自动对账系统 · 财务轻松高效</span>
                </div>
            </div>
        </div>
    </div>
    
    <div class="login-right">
        <div class="login-form">
            <h2>欢迎回来</h2>
            <p class="subtitle">登录您的商户账号</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>手机号码</label>
                    <div class="input-wrapper">
                        <i class="fas fa-mobile-alt"></i>
                        <input type="tel" class="form-input" id="phone" placeholder="请输入手机号" maxlength="11">
                        <button type="button" class="verify-btn" id="verifyBtn">获取验证码</button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>验证码</label>
                    <div class="input-wrapper">
                        <i class="fas fa-shield-alt"></i>
                        <input type="text" class="form-input" id="verifyCode" placeholder="请输入验证码" maxlength="6" style="padding-right: 16px;">
                    </div>
                </div>
                
                <button type="submit" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i>
                    立即登录
                </button>
            </form>
            
            <div class="divider"><span>或</span></div>
            
            <button class="demo-btn" onclick="enterDemo()">
                <i class="fas fa-play-circle"></i>
                快速体验演示版
            </button>
            
            <div class="pricing-preview">
                <h4>💰 超值套餐定价</h4>
                <div class="pricing-cards">
                    <div class="pricing-card">
                        <div class="price">¥99</div>
                        <div class="period">/月</div>
                        <div class="name">基础版</div>
                    </div>
                    <div class="pricing-card featured">
                        <div class="price">¥299</div>
                        <div class="period">/月</div>
                        <div class="name">专业版</div>
                    </div>
                    <div class="pricing-card">
                        <div class="price">¥599</div>
                        <div class="period">/月</div>
                        <div class="name">企业版</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 验证码倒计时
        let countdown = 60;
        const verifyBtn = document.getElementById('verifyBtn');
        
        verifyBtn.addEventListener('click', function() {
            const phone = document.getElementById('phone').value;
            if (!phone || phone.length !== 11) {
                alert('请输入正确的手机号');
                return;
            }
            
            this.disabled = true;
            this.textContent = `${countdown}秒后重试`;
            
            const timer = setInterval(() => {
                countdown--;
                if (countdown <= 0) {
                    clearInterval(timer);
                    this.disabled = false;
                    this.textContent = '获取验证码';
                    countdown = 60;
                } else {
                    this.textContent = `${countdown}秒后重试`;
                }
            }, 1000);
            
            // 演示：自动填入验证码
            setTimeout(() => {
                document.getElementById('verifyCode').value = '123456';
            }, 500);
        });
        
        // 登录表单提交
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const phone = document.getElementById('phone').value;
            const code = document.getElementById('verifyCode').value;
            
            if (!phone || !code) {
                alert('请填写完整信息');
                return;
            }
            
            // 演示模式：直接跳转
            window.location.href = 'merchant.html';
        });
        
        // 快速体验
        function enterDemo() {
            window.location.href = 'merchant.html';
        }
    </script>
</body>
</html>
