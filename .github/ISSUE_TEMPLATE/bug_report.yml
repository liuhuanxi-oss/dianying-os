name: 🐛 Bug报告
description: 报告一个bug帮助我们改进
title: '[BUG] '
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## 🐛 Bug报告

        感谢您发现bug！请填写以下信息来帮助我们快速定位和修复问题。
        
        **⚠️ 请确认这不是重复提交的bug，搜索现有issues。**

  - type: textarea
    id: description
    attributes:
      label: 📝 问题描述
      description: 请简要描述您遇到的问题
      placeholder: 例如：点击某个按钮后页面出现空白...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 📋 复现步骤
      description: 请详细描述复现问题的步骤
      placeholder: |
        1. 打开页面
        2. 点击"..."
        3. 出现错误
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: ✅ 期望行为
      description: 您希望看到什么样的结果？
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: ❌ 实际行为
      description: 实际发生了什么？
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: 🌐 浏览器/设备信息
      options:
        - Chrome (最新版)
        - Firefox (最新版)
        - Safari (最新版)
        - Edge (最新版)
        - 移动端Safari
        - 移动端Chrome
        - 其他
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: 📎 额外信息
      description: 控制台错误信息、截图等（可选）
      placeholder: |
        Error: ...
        截图：...
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: 📜 确认
      options:
        - label: 我已搜索确认这不是重复bug
          required: true
        - label: 我愿意配合进一步排查问题
          required: false
