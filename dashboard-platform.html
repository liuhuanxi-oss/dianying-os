    // ============================================
    // 时间更新
    // ============================================
    function updateTime() {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('zh-CN', { hour12: false });
      const dateStr = now.toLocaleDateString('zh-CN', {
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        weekday: 'long'
      });
      document.getElementById('currentTime').textContent = timeStr;
      document.getElementById('currentDate').textContent = dateStr;
    }
    setInterval(updateTime, 1000);
    updateTime();

    // ============================================
    // 数字滚动动画
    // ============================================
    function animateCounting() {
      document.querySelectorAll('.counting').forEach(el => {
        const target = parseFloat(el.dataset.target);
        const suffix = el.dataset.suffix || '';
        const isFloat = target < 100;
        const duration = 2000;
        const startTime = performance.now();

        function update(currentTime) {
          const elapsed = currentTime - startTime;
          const progress = Math.min(elapsed / duration, 1);
          const easeOut = 1 - Math.pow(1 - progress, 3);
          const current = target * easeOut;

          if (isFloat) {
            el.textContent = current.toFixed(1) + suffix;
          } else {
            el.textContent = Math.floor(current).toLocaleString() + suffix;
          }

          if (progress < 1) {
            requestAnimationFrame(update);
          }
        }
        requestAnimationFrame(update);
      });
    }

    // ============================================
    // 渲染商户排行
    // ============================================
    function renderMerchantRank() {
      const container = document.getElementById('merchantRank');
      const maxValue = Math.max(...mockData.merchantRank.map(r => r.value));

      container.innerHTML = mockData.merchantRank.map((item, index) => `
        <div class="rank-item top-${index + 1}">
          <span class="rank-num">${index + 1}</span>
          <span class="rank-name">${item.name}</span>
          <span class="rank-value">¥${(item.value / 10000).toFixed(1)}万</span>
        </div>
      `).join('');
    }

    // ============================================
    // 渲染实时交易流水
    // ============================================
    function generateTradeItems() {
      const merchants = [
        '北京朝阳店', '上海浦东店', '深圳南山店', '杭州西湖店', '广州天河店',
        '成都锦江店', '武汉江汉店', '西安雁塔店', '南京鼓楼店', '重庆渝北店',
        '苏州园区店', '天津河西店', '长沙岳麓店', '青岛崂山店', '沈阳铁西店'
      ];

      const items = [];
      for (let i = 0; i < 20; i++) {
        const name = merchants[Math.floor(Math.random() * merchants.length)];
        const amount = (Math.random() * 800 + 50).toFixed(2);
        const time = new Date(Date.now() - i * 30000).toLocaleTimeString('zh-CN', { hour12: false });
        items.push({ name, amount, time });
      }
      return items;
    }

    function renderTradeScroll() {
      const items = generateTradeItems();
      const html = items.map(item => `
        <div class="trade-item-scroll">
          <span class="time">${item.time}</span>
          <span class="merchant">${item.name}</span>
          <span class="amount">¥${item.amount}</span>
        </div>
      `).join('');

      document.getElementById('tradeScroll').innerHTML = html + html;
    }

            position: 'right',
            color: '#91d5ff',
            fontSize: 10,
            formatter: '{c}%'
          }
        }]
      });

      // 6. 行业分布
      charts.industryChart = echarts.init(document.getElementById('industryChart'));
      charts.industryChart.setOption({
        tooltip: {
          trigger: 'item',
          backgroundColor: 'rgba(15, 23, 42, 0.95)',
          borderColor: '#1890ff',
          textStyle: { color: '#fff' }
        },
        legend: { show: false },
        series: [{
          type: 'pie',
          radius: ['50%', '70%'],
          center: ['50%', '50%'],
          roseType: 'radius',
          label: {
            show: true,
            color: '#91d5ff',
            fontSize: 10,
            formatter: '{b}\n{d}%'
          },
          data: mockData.industries.map(i => ({
            name: i.name,
            value: i.value,
            itemStyle: { color: i.color }
          }))
        }]
      });

      // 7. 行业占比饼图
      charts.industryPieChart = echarts.init(document.getElementById('industryPieChart'));
      charts.industryPieChart.setOption({
        tooltip: {
          trigger: 'item',
          backgroundColor: 'rgba(15, 23, 42, 0.95)',
          borderColor: '#1890ff',
          textStyle: { color: '#fff' }
        },
        legend: {
          orient: 'vertical',
          right: '5%',
          top: 'center',
          textStyle: { color: '#91d5ff', fontSize: 10 },
          itemWidth: 10,
          itemHeight: 10
        },
        series: [{
          type: 'pie',
          radius: ['35%', '65%'],
          center: ['35%', '50%'],
          label: { show: false },
          data: mockData.industries.map(i => ({
            name: i.name,
            value: i.value,
            itemStyle: { color: i.color }
          }))
        }]
      });

      // 8. KPI迷你图表
      ['kpiChart1', 'kpiChart2', 'kpiChart3', 'kpiChart4'].forEach((id, index) => {
        const chart = echarts.init(document.getElementById(id));
        const data = Array.from({ length: 7 }, () => Math.floor(Math.random() * 50) + 50);

        chart.setOption({
          grid: { left: 0, right: 0, top: 0, bottom: 0 },
          xAxis: { show: false },
          yAxis: { show: false },
          series: [{
            type: 'line',
            data: data,
            smooth: true,
            showSymbol: false,
            lineStyle: { color: '#1890ff', width: 2 },
            areaStyle: {
              color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                { offset: 0, color: 'rgba(24, 144, 255, 0.3)' },
                { offset: 1, color: 'rgba(24, 144, 255, 0)' }
              ])
            }
          }]
        });
        charts[id] = chart;
      });
    }

    // ============================================
    // 窗口大小变化自适应
    // ============================================
    window.addEventListener('resize', () => {
      Object.values(charts).forEach(chart => chart.resize());
    });

    // ============================================
    // 页面初始化
    // ============================================
    window.addEventListener('load', () => {
      setTimeout(() => {
        lucide.createIcons();
        animateCounting();
        renderMerchantRank();
        renderTradeScroll();
        initCharts();
      }, 300);
    });

    // 实时数据刷新模拟
    setInterval(() => {
      // 随机更新一个图表的数据
      if (Math.random() > 0.5) {
        mockData.trendValues = mockData.trendValues.map(v => v + Math.floor(Math.random() * 20 - 10));
        charts.trendChart.setOption({
          series: [{ data: mockData.trendValues }]
        });
      }
    }, 10000);
  </script>
</body>
</html>
